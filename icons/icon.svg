<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#43A047"/>
      <stop offset="100%" style="stop-color:#2E7D32"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#66BB6A"/>
      <stop offset="100%" style="stop-color:#388E3C"/>
    </linearGradient>
    <linearGradient id="trunk" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5D4037"/>
      <stop offset="100%" style="stop-color:#4E342E"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>
  <!-- Tree trunk -->
  <rect x="220" y="260" width="72" height="160" rx="12" fill="url(#trunk)"/>
  <!-- Tree branches -->
  <rect x="220" y="320" width="140" height="20" rx="8" fill="url(#trunk)" transform="rotate(-15, 220, 330)"/>
  <rect x="152" y="300" width="120" height="18" rx="8" fill="url(#trunk)" transform="rotate(12, 152, 309)"/>
  <!-- Leaves - bottom layer -->
  <circle cx="208" cy="200" r="70" fill="url(#leaf)" opacity="0.9"/>
  <circle cx="304" cy="210" r="65" fill="url(#leaf)" opacity="0.9"/>
  <!-- Leaves - middle layer -->
  <circle cx="256" cy="170" r="75" fill="url(#leaf)"/>
  <circle cx="170" cy="230" r="55" fill="url(#leaf)"/>
  <circle cx="342" cy="230" r="55" fill="url(#leaf)"/>
  <!-- Leaves - top layer -->
  <circle cx="256" cy="140" r="55" fill="#81C784"/>
  <circle cx="220" cy="180" r="45" fill="#A5D6A7"/>
  <circle cx="300" cy="185" r="40" fill="#A5D6A7"/>
  <!-- Leaf highlight -->
  <circle cx="240" cy="130" r="20" fill="#C8E6C9" opacity="0.6"/>
  <!-- Small leaf details -->
  <ellipse cx="220" cy="155" rx="15" ry="8" fill="#C8E6C9" opacity="0.4" transform="rotate(-30, 220, 155)"/>
  <ellipse cx="290" cy="160" rx="12" ry="7" fill="#C8E6C9" opacity="0.4" transform="rotate(25, 290, 160)"/>
  <!-- Grass at base -->
  <ellipse cx="210" cy="420" rx="30" ry="10" fill="#4CAF50" opacity="0.7"/>
  <ellipse cx="256" cy="425" rx="25" ry="8" fill="#66BB6A" opacity="0.6"/>
  <ellipse cx="300" cy="420" rx="28" ry="9" fill="#4CAF50" opacity="0.7"/>
</svg>
